[build.env]
passthrough = [
    "MEMORY_ARCHIVE_CONFIG",
    "MA_IPC_TOKEN",
    "MA_ANNOTATOR_MGMT_TOKEN",
]

[target.x86_64-unknown-linux-musl]
image = "ghcr.io/cross-rs/x86_64-unknown-linux-musl:main"
pre-build = [
    "apt-get update && apt-get install -y cmake libssl-dev",
]

[target.aarch64-unknown-linux-gnu]
image = "ghcr.io/cross-rs/aarch64-unknown-linux-gnu:main"
pre-build = [
    "dpkg --add-architecture arm64 && apt-get update && apt-get install -y cmake libssl-dev:arm64 zlib1g-dev:arm64 libcurl4-openssl-dev:arm64 curl unzip",
    "curl -fsSL https://github.com/protocolbuffers/protobuf/releases/download/v25.3/protoc-25.3-linux-x86_64.zip -o /tmp/protoc.zip && unzip -o /tmp/protoc.zip -d /usr/local bin/protoc && chmod +x /usr/local/bin/protoc",
    "cp /usr/lib/aarch64-linux-gnu/libz.a /usr/aarch64-linux-gnu/lib/libz.a && cp /usr/include/zlib.h /usr/aarch64-linux-gnu/include/zlib.h",
    "cp /usr/lib/aarch64-linux-gnu/libssl.a /usr/aarch64-linux-gnu/lib/libssl.a && cp /usr/lib/aarch64-linux-gnu/libcrypto.a /usr/aarch64-linux-gnu/lib/libcrypto.a && cp -r /usr/include/openssl /usr/aarch64-linux-gnu/include/openssl",
    "cp -r /usr/include/aarch64-linux-gnu/curl /usr/aarch64-linux-gnu/include/curl",
]

[target.aarch64-unknown-linux-musl]
image = "ghcr.io/cross-rs/aarch64-unknown-linux-musl:main"
pre-build = [
    "apt-get update && apt-get install -y cmake libssl-dev",
]